<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Fixed Shooting Game</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

#gameContainer {
  position: relative;
  width: 400px;
  height: 600px;
  display: none;
}

#gameCanvas {
  width: 400px;
  height: 600px;
  background: black;
  display: block;
}

#selectScreen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  color: white;
  display: block;
  text-align: center;
}

#selectScreen h1 {
  margin-top: 30px;
  font-size: 32px;
}

#shotSelectButtons {
  margin-top: 40px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

#startButton {
  margin-top: 30px;
  width: 200px;
  height: 60px;
  font-size: 24px;
  border-radius: 10px;
  border: none;
  background: #444;
  color: white;
}

#startButton:disabled {
  background: #222;
  color: #777;
}

#shotButtonsContainer {
  position: absolute;
  top: 0;
  left: 0;
  width: 400px;
  height: 600px;
  pointer-events: none;
}

.shot-button.selected {
  outline: 4px solid yellow;
}
</style>
</head>

<body>

<div id="titleScreen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; display: block; text-align: center; z-index: 2000;">
  <h1 style="margin-top: 100px; font-size: 48px; color: red; text-shadow: 2px 2px 5px white;">BOSS-SHOOTING</h1>
  <div style="margin-top: 100px; display: flex; flex-direction: column; align-items: center; gap: 20px;">
    <button id="btn-start-game" style="width: 250px; height: 60px; font-size: 24px; border-radius: 10px; border: 2px solid white; background: #000; color: white; cursor: pointer;">スタート</button>
    <button id="btn-show-records" style="width: 250px; height: 60px; font-size: 24px; border-radius: 10px; border: 2px solid white; background: #000; color: white; cursor: pointer;">記録</button>
  </div>
</div>

<div id="recordScreen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; display: none; text-align: center; z-index: 2000;">
  <h1 style="margin-top: 50px;">RECORDS</h1>
  <div id="recordList" style="margin: 40px auto; width: 80%; font-size: 24px; text-align: left; line-height: 1.8; font-family: monospace;">
    </div>
  <button id="btn-back-to-title" style="width: 200px; height: 50px; font-size: 20px; border-radius: 5px; border: 1px solid white; background: #333; color: white; cursor: pointer;">戻る</button>
<button id="btn-clear-records" style="width: 200px; height: 50px; font-size: 20px; background: #8b0000; color: #fff; border: 1px solid #fff; border-radius: 5px; cursor: pointer;">記録クリア</button>
</div>

<div id="selectScreen">
  <h1>MISSION SELECT</h1>
  
  <div id="levelSelector" style="margin: 20px 0; font-size: 24px; display: flex; justify-content: center; align-items: center; gap: 20px;">
    <button id="prevLevel" style="width: 50px; height: 50px; font-size: 24px; background: #444; color: white; border: 1px solid white; border-radius: 5px; cursor: pointer;">◁</button>
    <span id="levelDisplay" style="min-width: 120px; font-weight: bold;">LV-001</span>
    <button id="nextLevel" style="width: 50px; height: 50px; font-size: 24px; background: #444; color: white; border: 1px solid white; border-radius: 5px; cursor: pointer;">▷</button>
  </div>

  <hr style="width: 80%; border: 0.5px solid #333;">

  <h3>ショットを３つ選んでください</h3>
  <div id="shotSelectButtons"></div>
  <button id="startButton" disabled>START</button>
</div>

<div id="gameContainer">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div id="shotButtonsContainer"></div>
</div>

<!-- ステージ -->
<script src="js/stage.js"></script>

<!-- 弾定義 -->
<script src="js/shots.js"></script>

<!-- 敵定義 -->
<script src="js/enemies.js"></script>

<!-- 敵ボス定義 -->
<script src="js/boss.js"></script>

<!-- メイン -->
<script src="js/game.js"></script>

</body>
</html>
